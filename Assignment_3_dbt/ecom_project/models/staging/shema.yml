version: 2

models:
  - name: stg_users
    columns:
      - name: user_id
        tests:
          - unique
          - not_null

  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: order_status
        tests:
          - accepted_values:
              values: ['delivered', 'shipped', 'returned', 'cancelled', 'processing']
      - name: user_id
        tests:
          - relationships:
              to: ref('stg_users')
              field: user_id